<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Model Viewer</title>
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f0f0f0;
        width: 100%;
        height: 100dvh;
      }
      model-viewer {
        width: 100%;
        height: 100dvh;
        position: relative;
        z-index: 0;
      }

      /* Native or custom AR button styling */
      #ar-button {
        display: flex;
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 999;
        width: auto;
        height: auto;
        cursor: pointer;
      }
      
      /* Google hides the button automatically if AR is unsupported */
      .ar-button-hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <model-viewer
      id="model-viewer"
      src="Table-02.glb"
      ios-src="Table-01.usdz"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls
      tone-mapping="neutral"
      shadow-intensity="1"
      exposure="1"
      environment-image="legacy"
    >
      <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
      </div>

      <button id="ar-button" slot="ar-button">View in your space</button>
    </model-viewer>

    <script>
      const viewer = document.getElementById("model-viewer");
      const button = document.getElementById("ar-button");

      // iOS Quick Look compatibility check
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      const checkAR = () => {
        // If it's iOS, model-viewer will natively handle the quick-look bypass.
        // If it's Android/WebXR and can't activate AR, disable the button.
        if (!isIOS && !viewer.canActivateAR) {
          button.disabled = true;
          button.textContent = "AR Not Supported";
        }
      };

      // Model-viewer fires 'ar-status' when initializing AR capabilities
      viewer.addEventListener("ar-status", (event) => {
        if (event.detail.status === "failed") {
          console.error("AR failed to launch", event.detail);
        }
      });

      viewer.addEventListener("load", checkAR);
      if (viewer.loaded) checkAR();
    </script>
  </body>
</html>
