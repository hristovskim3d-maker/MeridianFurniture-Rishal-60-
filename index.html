<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Model Viewer</title>
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f0f0f0;
        width: 100%;
        height: 100dvh;
      }
      model-viewer {
        width: 100%;
        height: 100dvh;
        position: relative;
        z-index: 0;
      }

      /* Ensures the custom button stays on top */
      #ar-button {
        display: flex;
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        z-index: 999;
        width: auto;
        height: auto;
        cursor: pointer;
      }
      #ar-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <model-viewer
      id="model-viewer"
      src="Table-02.glb"
      ios-src="Table-02.usdz"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      tone-mapping="neutral"
      shadow-intensity="1"
      exposure="1"
      environment-image="legacy"
    >
      <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
      </div>

      <button id="ar-button" slot="ar-button">View in your space</button>
    </model-viewer>

    <script>
      const viewer = document.getElementById("model-viewer");
      const button = document.getElementById("ar-button");

      // Check AR support safely across devices
      const checkAR = () => {
        if (!viewer.canActivateAR) {
          button.disabled = true;
          button.textContent = "AR Not Supported";
        }
      };

      // Check on load, or immediately if the viewer is already loaded
      viewer.addEventListener("load", checkAR);
      if (viewer.loaded) checkAR();
    </script>
  </body>
</html>
